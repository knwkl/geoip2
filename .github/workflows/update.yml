name: Update Surge Geo Rules

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas requests

      - name: Download IPInfo Lite CSV
        env:
          IPINFO_TOKEN: ${{ secrets.IPINFO_TOKEN }}
        run: |
          curl -L "https://ipinfo.io/data/free/ipinfo_lite.csv.gz?token=${IPINFO_TOKEN}" -o ipinfo_lite.csv.gz
          file ipinfo_lite.csv.gz
          if file ipinfo_lite.csv.gz | grep -q gzip; then
            gunzip ipinfo_lite.csv.gz
          else
            echo "第一个地址失败，内容："
            cat ipinfo_lite.csv.gz
            echo "尝试第二个地址..."
            curl -L "https://ipinfo.io/data/free/lite.csv.gz?token=${IPINFO_TOKEN}" -o ipinfo_lite.csv.gz
            file ipinfo_lite.csv.gz
            if file ipinfo_lite.csv.gz | grep -q gzip; then
              gunzip ipinfo_lite.csv.gz
            else
              echo "第二个地址也失败，内容："
              cat ipinfo_lite.csv.gz
              exit 1
            fi
          fi
          head -2 ipinfo_lite.csv

      - name: Run extraction script
        run: python extract.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Country_CIDR/ README.md
          git diff --cached --quiet || git commit -m "Auto update: $(date -u +'%Y-%m-%dT%H:%M:%S+00:00')"
          git push
